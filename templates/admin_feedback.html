<!DOCTYPE html>
<html>
<head>
    <title>Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <h2 class="mb-4">Student Feedback</h2>

    <table class="table table-bordered table-striped table-hover shadow text-center align-middle">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>PRN</th>
                <th>Feedback</th>
            </tr>
        </thead>

        <tbody>
            {% for f in data %}
            <tr>
                <td>{{ f[0] }}</td>
                <td>{{ f[1] }}</td>
                <td>{{ f[2] }}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

    <a href="/admin_dashboard" class="btn btn-primary mt-3">Back</a>

</div>

</body>
</html>
