<!DOCTYPE html>
<html>
<head>
    <title>Update Mess Timetable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4" style="background: #ffe5b4;">

<h2 class="mb-4">Update Mess Timetable</h2>

<!-- ADD / UPDATE FORM -->
<form method="POST" class="mb-4">

    <select name="day" class="form-control mb-2" required>
        <option value="">Select Day</option>
        <option>Monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thursday</option>
        <option>Friday</option>
        <option>Saturday</option>
        <option>Sunday</option>
    </select>

    <input type="text" name="breakfast" placeholder="Breakfast" class="form-control mb-2" required>
    <input type="text" name="lunch" placeholder="Lunch" class="form-control mb-2" required>
    <input type="text" name="dinner" placeholder="Dinner" class="form-control mb-2" required>

    <button class="btn btn-success w-100">Save / Update</button>
</form>

<hr>

<h4>Current Timetable</h4>

<table class="table table-bordered text-center">
    <tr>
        <th>Day</th>
        <th>Breakfast</th>
        <th>Lunch</th>
        <th>Dinner</th>
        <th>Action</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
        <td>
            <a href="/delete_timetable/{{ row[0] }}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

<a href="/admin_dashboard" class="btn btn-secondary mt-3">Back</a>

</body>
</html>
