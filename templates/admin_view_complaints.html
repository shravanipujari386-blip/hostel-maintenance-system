<!DOCTYPE html>
<html>
<head>
    <title>Admin Complaints</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <h2 class="mb-4">All Complaints</h2>

    <table class="table table-bordered table-striped table-hover shadow text-center align-middle">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>PRN</th>
                <th>Room</th>
                <th>Category</th>
                <th>Problem</th>
                <th>Status</th>
                <th>Worker</th>
                <th>Phone</th>
                <th>Date</th>
                <th>Assign</th>
            </tr>
        </thead>

        <tbody>
            {% for c in complaints %}
            <tr>
                <td>{{ c[0] }}</td>
                <td>{{ c[1] }}</td>
                <td>{{ c[2] }}</td>
                <td>{{ c[3] }}</td>
                <td>{{ c[4] }}</td>
                <td>{{ c[5] }}</td>
                <td>{{ c[6] }}</td>
                <td>{{ c[7] }}</td>
                <td>{{ c[8] }}</td>

                <td>
                    <form action="/assign_worker/{{ c[0] }}" method="POST">
                        <input type="text" name="worker" placeholder="Worker" required class="form-control mb-1">
                        <input type="text" name="phone" placeholder="Phone" required class="form-control mb-1">
                        <input type="date" name="date" required class="form-control mb-1">

                        <select name="status" class="form-control mb-1">
                            <option>Pending</option>
                            <option>In Progress</option>
                            <option>Completed</option>
                        </select>

                        <button class="btn btn-success btn-sm">Update</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

    <a href="/admin_dashboard" class="btn btn-primary mt-3">Back</a>

</div>

</body>
</html>
