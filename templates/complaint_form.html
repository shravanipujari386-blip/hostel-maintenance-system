<!DOCTYPE html>
<html>
<head>
    <title>Complaint Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow text-center" style="width: 400px;">

    <h3>File Complaint</h3>

    <form method="POST">
        <input type="text" name="room" class="form-control mb-3" placeholder="Room Number" required>
        <textarea name="description" class="form-control mb-3" placeholder="Issue Description" required></textarea>

        <button class="btn btn-primary">Submit</button>
    </form>

    <a href="/file_complaint" class="btn btn-secondary mt-3">Back</a>

</div>

</body>
</html>
