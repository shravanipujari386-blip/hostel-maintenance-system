<!DOCTYPE html>
<html>
<head>
    <title>Mess Timetable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <h2 class="mb-4">Mess Timetable</h2>

    <table class="table table-bordered table-striped table-hover shadow text-center align-middle">

        <thead class="table-dark">
            <tr>
                <th>Day</th>
                <th>Breakfast</th>
                <th>Lunch</th>
                <th>Dinner</th>
            </tr>
        </thead>

        <tbody>
            {% for t in data %}
            <tr>
                <td>{{ t[1] }}</td>
                <td>{{ t[2] }}</td>
                <td>{{ t[3] }}</td>
                <td>{{ t[4] }}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

    <a href="/student_dashboard" class="btn btn-primary mt-3">Back</a>

</div>

</body>
</html>
