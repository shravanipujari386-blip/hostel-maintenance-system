<!DOCTYPE html>
<html>
<head>
    <title>File Complaint</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fc;
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .complaint-card {
            width: 200px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            background: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
            text-decoration: none;
            color: black;
        }

        .complaint-card:hover {
            transform: translateY(-8px) scale(1.05);
        }

        .complaint-img {
            height: 100px;
            object-fit: contain;
        }

        .back-btn {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="title">Select Complaint Type</h2>

    <div class="card-container">

        <!-- Electrician -->
        <a href="/complaint_form/Electrician" class="complaint-card">
            <img src="{{ url_for('static', filename='images/electrician.png') }}" class="complaint-img">
            <h5 class="mt-3">Electrician</h5>
        </a>

        <!-- Plumber -->
        <a href="/complaint_form/Plumber" class="complaint-card">
            <img src="{{ url_for('static', filename='images/plumber.png') }}" class="complaint-img">
            <h5 class="mt-3">Plumber</h5>
        </a>

        <!-- Mess -->
        <a href="/complaint_form/Mess" class="complaint-card">
            <img src="{{ url_for('static', filename='images/messfood.png') }}" class="complaint-img">
            <h5 class="mt-3">Mess Food</h5>
        </a>

        <!-- Other -->
        <a href="/complaint_form/Other" class="complaint-card">
            <img src="{{ url_for('static', filename='images/other.png') }}" class="complaint-img">
            <h5 class="mt-3">Other</h5>
        </a>

    </div>

    <div class="text-center back-btn">
        <a href="/student_dashboard" class="btn btn-primary">Back</a>
    </div>

</div>

</body>
</html>
