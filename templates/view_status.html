<!DOCTYPE html>
<html>
<head>
    <title>View Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <h2 class="mb-4">Your Complaints</h2>

    <table class="table table-bordered table-striped table-hover shadow text-center align-middle">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Room</th>
                <th>Category</th>
                <th>Problem</th>
                <th>Status</th>
                <th>Worker</th>
                <th>Phone</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>
            {% for c in complaints %}
            <tr>
                <td>{{ c[0] }}</td>
                <td>{{ c[2] }}</td>
                <td>{{ c[3] }}</td>
                <td>{{ c[4] }}</td>
                <td>{{ c[5] }}</td>
                <td>{{ c[6] }}</td>
                <td>{{ c[7] }}</td>
                <td>{{ c[8] }}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

    <a href="/student_dashboard" class="btn btn-primary mt-3">Back</a>

</div>

</body>
</html>
